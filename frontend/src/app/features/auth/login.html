<div class="min-h-screen bg-white flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">

    <div class="bg-green-800 p-6 text-center">
      <h1 class="text-3xl font-bold text-white tracking-wider">
        Easy<span class="text-lime-400">Parte</span>
      </h1>
      <p class="text-white text-sm mt-2">Acceso al panel de gestión</p>
    </div>

    <div class="p-8">
      <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="space-y-6">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
          <input type="email" formControlName="email"
                 class="w-full border border-slate-300 rounded-md p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                 placeholder="usuario@empresa.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
          <input type="password" formControlName="password"
                 class="w-full border border-slate-300 rounded-md p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                 placeholder="••••••••">
        </div>

        @if (errorLogin()) {
          <div class="bg-red-50 text-red-600 text-sm p-3 rounded-md border border-red-200">
            ❌ Usuario o contraseña incorrectos.
          </div>
        }

        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-green-600 hover:bg-green-700 disabled:bg-slate-400 text-white font-bold py-3 px-4 rounded-md shadow transition-colors">
          Iniciar Sesión
        </button>

      </form>
    </div>
  </div>
</div>
